apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "ui-testing-tool.labels" . | nindent 4 }}
    app.kubernetes.io/name: ui-testing-tool
    app.kubernetes.io/component: app
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ui-testing-tool
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "ui-testing-tool.labels" . | nindent 8 }}
        app.kubernetes.io/name: ui-testing-tool
        app.kubernetes.io/component: app
    spec:
      imagePullSecrets:
        - name: github-registry
      containers:
        - name: ui-testing-tool
          image: "{{ .Values.images.app.image }}:{{ .Values.images.app.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: FLASK_ENV
              value: "production"
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            {{- if .Values.secrets }}
            - secretRef:
                name: {{ .Release.Name }}-secrets
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
